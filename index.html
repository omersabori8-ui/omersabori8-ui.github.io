<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Page</title>

<style>

body{
margin:0;
padding:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
font-family:Arial;
background:linear-gradient(270deg,#0c2899,#020a0d,#1c22d2);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
text-align:center;
width:85%;
max-width:320px;
margin-top:20px;
}

.search{
width:100%;
padding:12px;
font-size:16px;
border-radius:30px;
border:none;
outline:none;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.number{
margin-top:15px;
font-size:16px;
color:white;
font-weight:bold;
}

/* products */

.products{
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:400px;
}

.product{
width:90%;
margin-top:20px;
text-align:center;
}

.product img{
width:100%;
max-width:350px;
border-radius:10px;
}

.whatsapp{
margin-top:10px;
display:inline-block;
padding:10px 20px;
background:#25D366;
color:white;
text-decoration:none;
font-size:15px;
border-radius:25px;
}

.whatsapp:hover{
background:#1ebe5d;
}

</style>
</head>

<body>

<div class="box">

<input class="search" type="text" placeholder="Search...">

<div class="number">
+93 70 844 8744
</div>

</div>

<div class="products">

<!-- product 1 -->

<div class="product">

<img src="https://i.imgur.com/Vn6XG6H.jpg">

<br>

<a class="whatsapp"
href="https://wa.me/93708448744?text=سلام%20این%20محصول%20را%20میخواهم%20👇%0Aکرم%20لیفتینگ%20لدورا%0Ahttps://i.imgur.com/Vn6XG6H.jpg">
سفارش در WhatsApp
</a>

</div>

<!-- product 2 -->

<div class="product">

<img src="https://i.imgur.com/l2mXG3K.jpg">

<br>

<a class="whatsapp"
href="https://wa.me/93708448744?text=سلام%20این%20محصول%20را%20میخواهم%20👇%0Aماسک%20اسکراب%20لدورا%0Ahttps://i.imgur.com/l2mXG3K.jpg">
سفارش در WhatsApp
</a>

</div>

</div>

</body>
</html>
