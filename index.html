<!DOCTYPE html>
<html lang="fa">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6204592582582015"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<title>sabori / Sabori</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(270deg, #0044cc, #00aaff, #0044cc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    position: relative;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .title {
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 40px;
    color: #ffffff;
    text-align: center;
  }

  .footer {
    margin-top: 40px;
    font-size: 22px;
    color: #ffffff;
    text-align: center;
  }

  .whatsapp-button,
  .tiktok-button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 20px;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .whatsapp-button { background-color: #25D366; }
  .whatsapp-button:hover { background-color: #1ebe5d; }

  .tiktok-button { background-color: #000000; }
  .tiktok-button:hover { background-color: #333333; }

  .qrcode-wrapper { cursor: default; margin-top: 30px; }
  .tiktok-logo { width: 24px; height: 24px; }

  /* دکمه‌ها در کنج بالا */
  .top-buttons {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  .info-button, .welcome-button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .info-button {
    background-color: #000000;
    color: #ffffff;
  }
  .info-button:hover { background-color: #222222; }

  .welcome-button {
    background-color: #ffcc00;
    color: #000000;
  }
  .welcome-button:hover { background-color: #ffd633; }

  /* جعبه نمایش اطلاعات popup-like */
  .popup-text {
    position: absolute;
    top: 60px; /* درست زیر دکمه‌ها */
    right: 20px;
    background-color: rgba(0,0,0,0.85);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 8px;
    max-width: 300px;
    display: none; /* مخفی به صورت پیش فرض */
    z-index: 20;
    line-height: 1.5;
  }

  .popup-text.welcome {
    background-color: rgba(255,204,0,0.95);
    color: #000000;
  }

</style>
</head>
<body>

  <div class="top-buttons">
    <button class="info-button" onclick="togglePopup('info')">معلومات</button>
    <button class="welcome-button" onclick="togglePopup('welcome')">خوش آمد گوی</button>
  </div>

  <div class="title">sabori / Sabori</div>

  <div class="qrcode-wrapper">
    <canvas id="qrcode"></canvas>
  </div>

  <button class="tiktok-button" onclick="window.open('https://www.tiktok.com/@hajiomarsabori', '_blank')">
    <img class="tiktok-logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg" alt="TikTok">
    دنبال کردن در TikTok
  </button>

  <button class="whatsapp-button" onclick="window.open('https://wa.me/93731983000', '_blank')">
    ارسال پیام در واتساپ
  </button>

  <div id="info-popup" class="popup-text">
    این ویپ سایت برای کسانی است که پول در پی پال دارند و نمی‌توانند کشیده، ما اینجا هستیم تا کمک کنیم پول‌هایشان را نقد کنند .
  </div>

  <div id="welcome-popup" class="popup-text welcome">
    سلام! امیدوارم با این ویپ سایت مشکل شما حل شده باشد و همیشه با ما باشید.
  </div>

  <div class="footer">
    دریافت پول از پی پال<br>
    Receive money from PayPal
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const canvas = document.getElementById('qrcode');
    const link = "https://omersabori8-ui.github.io";

    QRCode.toCanvas(canvas, link, {
      width: 300,
      color: { dark: '#0044cc', light: '#ffffff' }
    }, function (error) {
      if (error) console.error(error);
    });

    function togglePopup(type) {
      const infoPopup = document.getElementById('info-popup');
      const welcomePopup = document.getElementById('welcome-popup');

      if(type === 'info') {
        infoPopup.style.display = infoPopup.style.display === 'none' ? 'block' : 'none';
        welcomePopup.style.display = 'none';
      } else if(type === 'welcome') {
        welcomePopup.style.display = welcomePopup.style.display === 'none' ? 'block' : 'none';
        infoPopup.style.display = 'none';
      }
    }
  </script>

</body>
</html>
