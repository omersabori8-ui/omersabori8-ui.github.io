<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>sabori</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(270deg, #0044cc, #00aaff, #0044cc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    margin: 0;
  }
  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }
  .title {
    font-size: 50px; /* بزرگ و واضح */
    font-weight: bold;
    margin-bottom: 40px;
    color: #ffffff; /* رنگ ثابت سفید */
  }
  .footer {
    margin-top: 40px;
    font-size: 24px; /* بزرگتر */
    color: #ffffff; /* رنگ ثابت سفید */
    text-align: center;
  }
</style>
</head>
<body>

<div class="title">sabori</div>

<canvas id="qrcode"></canvas>

<div class="footer">
  داخل شدن به ویپ سایت<br>
  دریافت پول از پی پال
</div>

<!-- QR Code JS -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  const link = "https://wa.me/93731983000"; // لینک واتساپ
  const canvas = document.getElementById('qrcode');

  QRCode.toCanvas(canvas, link, {
    width: 300,
    color: {
      dark: '#0044cc', // رنگ QR
      light: '#ffffff'
    }
  }, function (error) {
    if (error) console.error(error);
    console.log('QR Code آماده شد!');
  });
</script>

</body>
</html>
