<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saboori Secure Auth</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

/* انیمیشن پس‌زمینه */
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #361599, #4203ff, #ff7b00, #804000);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    padding: 20px; /* برای فاصله در موبایل */
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container{
    width: 100%;
    max-width: 800px; /* حداکثر عرض در کامپیوتر */
    min-height: 450px;
    display: flex;
    flex-direction: row; /* حالت افقی در کامپیوتر */
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    background: rgba(15, 15, 15, 0.95);
}

.left{
    width: 50%;
    padding: 40px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right{
    width: 50%;
    background: linear-gradient(135deg, #ff7b00, #ffcc00);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    padding: 20px;
}

/* تنظیمات مخصوص موبایل */
@media (max-width: 768px) {
    .container {
        flex-direction: column-reverse; /* بخش رنگی بالا و فرم پایین */
        max-width: 400px;
        height: auto;
    }
    .left, .right {
        width: 100%;
    }
    .right {
        padding: 40px 20px;
        font-size: 24px;
    }
    .left {
        padding: 30px 20px;
    }
}

.input-box{margin-bottom:20px;}
.input-box input{
    width:100%;
    padding:12px;
    background:transparent;
    border:none;
    border-bottom:2px solid #555;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    background:linear-gradient(to right, #ff7b00, #ffcc00);
    font-weight:bold;
    cursor:pointer;
    transition: 0.3s;
    color: #000;
}

button:hover{
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(255, 123, 0, 0.4);
}

.switch{margin-top:15px;font-size:14px; text-align: center;}
.switch span{color:orange;cursor:pointer; text-decoration: underline;}

.hidden{display:none;}
.message{margin-top:10px;font-size:14px; text-align: center;}
.error{color:#ff4d4d; font-weight: bold;}
.success{color:lightgreen;}
</style>
</head>

<body>

<div class="container">
    <div class="left">
        <div id="loginForm">
            <h2 style="margin-bottom: 20px;">Login</h2>
            <div class="input-box">
                <input type="email" id="loginEmail" placeholder="Email">
            </div>
            <div class="input-box">
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button onclick="login()">Start Session</button>
            <div class="switch">
                Don't have account? <span onclick="showRegister()">Register</span>
            </div>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="registerForm" class="hidden">
            <h2 style="margin-bottom: 20px;">Register</h2>
            <div class="input-box">
                <input type="email" id="regEmail" placeholder="Email">
            </div>
            <div class="input-box">
                <input type="password" id="regPass" placeholder="Password">
            </div>
            <button onclick="register()">Create Account</button>
            <div class="switch">
                Already have account? <span onclick="showLogin()">Login</span>
            </div>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <div class="right">
        Saboori<br>Secure Auth
    </div>
</div>

<script>
let storedEmail="";
let storedPass="";

function showRegister(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

function isValidEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function register(){
    const email = document.getElementById("regEmail").value.trim();
    const pass = document.getElementById("regPass").value.trim();
    const msg = document.getElementById("registerMessage");

    if(!isValidEmail(email)){
        msg.className="message error";
        msg.innerText="Invalid Email Format!";
        return;
    }
    if(pass.length < 4){
        msg.className="message error";
        msg.innerText="Password too short!";
        return;
    }

    storedEmail=email;
    storedPass=pass;
    msg.className="message success";
    msg.innerText="Account Created! Now Login.";
    setTimeout(showLogin, 1500);
}

function login(){
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const msg = document.getElementById("loginMessage");

    if(email===storedEmail && pass===storedPass && email !== ""){
        msg.className="message success";
        msg.innerText="Login Successful!";
    }else{
        msg.className="message error";
        msg.innerText="Wrong Email or Password!";
    }
}
</script>

</body>
</html>
