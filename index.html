<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIP Color Live</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
font-family:tahoma;
color:white;
}

/* 🌈 پس زمینه چند رنگ متحرک */
body{
background:linear-gradient(270deg,
#ff0000,
#ff7300,
#ff00aa,
#6a00ff,
#00c3ff,
#00ff88);
background-size:1200% 1200%;
animation:rainbowMove 15s ease infinite;
display:flex;
flex-direction:column;
}

@keyframes rainbowMove{
0%{background-position:0% 50%;}
25%{background-position:50% 100%;}
50%{background-position:100% 50%;}
75%{background-position:50% 0%;}
100%{background-position:0% 50%;}
}

/* ✨ نور متحرک روی صفحه */
body::before{
content:'';
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
animation:lightMove 8s linear infinite;
}

@keyframes lightMove{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

/* ===== HEADER ===== */
header{
text-align:center;
padding:15px;
font-size:18px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(6px);
z-index:2;
}

/* ===== SLIDER ===== */
.slider{
flex:2;
position:relative;
overflow:hidden;
z-index:2;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
animation:fadeSlide 12s infinite;
border-radius:15px;
}

.slide:nth-child(1){background-image:url('https://picsum.photos/600/800?701');}
.slide:nth-child(2){background-image:url('https://picsum.photos/600/800?702'); animation-delay:4s;}
.slide:nth-child(3){background-image:url('https://picsum.photos/600/800?703'); animation-delay:8s;}

@keyframes fadeSlide{
0%{opacity:0;}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

/* ===== MOVIES ===== */
.movies{
flex:2;
display:flex;
justify-content:space-around;
align-items:center;
padding:10px;
z-index:2;
}

.card{
width:30%;
border-radius:15px;
overflow:hidden;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(6px);
transition:0.4s;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:12px;
padding:5px;
}

/* ⭐ رنک رنگی متحرک */
.rank{
margin:6px;
padding:4px;
font-size:11px;
border-radius:10px;
background:linear-gradient(90deg,#ffffff,#ffff00,#ffffff);
color:#ff0000;
animation:rankShine 2s infinite linear;
}

@keyframes rankShine{
0%{box-shadow:0 0 5px #fff;}
50%{box-shadow:0 0 20px #ffff00;}
100%{box-shadow:0 0 5px #fff;}
}

/* Hover */
.card:hover{
transform:scale(1.1);
background:rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<header>
🔥 sabori video 🔥
</header>



<div class="movies">

<!-- ===== TOP SETTINGS BUTTON ===== -->
<div id="topSettings">
  <button onclick="openSettings()">⚙️ تنظیمات</button>
  <button onclick="openAbout()">ℹ️ معلومات</button>
</div>

<!-- ===== SETTINGS PANEL ===== -->
<div id="settingsPanel" class="panel">
  <div class="panel-box">
    <h2>تنظیمات سایت</h2>

    <!-- Dark Mode -->
    <div class="setting-item">
      <span>حالت تاریک</span>
      <input type="checkbox" id="darkMode" onchange="toggleDark()">
    </div>

    <!-- Sound Control -->
    <div class="setting-item">
      <span>صدا ویدیو</span>
      <input type="checkbox" id="soundMode" onchange="toggleSound()">
    </div>

    <!-- Video Size -->
    <div class="setting-item">
      <span>ویدیو بزرگ</span>
      <input type="checkbox" id="videoSize" onchange="toggleVideoSize()">
    </div>

    <!-- Background Color -->
    <button onclick="changeBackground()">🎨 تغییر رنگ سایت</button>

    <br><br>
    <button onclick="closeSettings()">بستن</button>
  </div>
</div>

<!-- ===== ABOUT PANEL ===== -->
<div id="aboutPanel" class="panel">
  <div class="panel-box">
    <h2>معلومات درباره سایت</h2>
    <p>نام سایت: Sabori Video</p>
    <p>نسخه: 1.0</p>
    <p>این ویب سایت برای نمایش ویدیو آنلاین در موبایل و کمپیوتر ساخته شده.</p>
    <p>پشتیبانی: HTML + GitHub Pages</p>
    <button onclick="closeAbout()">بستن</button>
  </div>
</div>

<style>
#topSettings{
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
}
#topSettings button{
  padding: 8px 14px;
  margin: 4px;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  background: white;
}

.panel{
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 10000;
}
.panel-box{
  background: white;
  padding: 20px;
  width: 85%;
  max-width: 320px;
  margin: 90px auto;
  border-radius: 15px;
  text-align: center;
}

.setting-item{
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  font-size: 16px;
}

/* Dark Mode */
.dark{
  background: #111 !important;
  color: white !important;
}

/* Large Video */
.big-video video{
  width: 100% !important;
  height: auto !important;
}
</style>

<script>
// Open & Close Panels
function openSettings(){
  document.getElementById("settingsPanel").style.display="block";
}
function closeSettings(){
  document.getElementById("settingsPanel").style.display="none";
}
function openAbout(){
  document.getElementById("aboutPanel").style.display="block";
}
function closeAbout(){
  document.getElementById("aboutPanel").style.display="none";
}

// Dark Mode (with save)
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

// Sound Control
function toggleSound(){
  const videos = document.querySelectorAll("video");
  const soundOn = document.getElementById("soundMode").checked;
  videos.forEach(v=>{
    v.muted = !soundOn;
  });
  localStorage.setItem("soundMode", soundOn);
}

// Video Size
function toggleVideoSize(){
  document.body.classList.toggle("big-video");
  localStorage.setItem("videoSize", document.body.classList.contains("big-video"));
}

// Background Color Change
function changeBackground(){
  const colors = ["#ff008c","#ff4da6","#6a11cb","#00c6ff","#222"];
  const random = colors[Math.floor(Math.random()*colors.length)];
  document.body.style.background = random;
  localStorage.setItem("bgColor", random);
}

// Load Saved Settings
window.onload = function(){
  if(localStorage.getItem("darkMode") === "true"){
    document.body.classList.add("dark");
    document.getElementById("darkMode").checked = true;
  }

  if(localStorage.getItem("soundMode") === "true"){
    document.getElementById("soundMode").checked = true;
    toggleSound();
  }

  if(localStorage.getItem("videoSize") === "true"){
    document.body.classList.add("big-video");
    document.getElementById("videoSize").checked = true;
  }

  const savedBg = localStorage.getItem("bgColor");
  if(savedBg){
    document.body.style.background = savedBg;
  }
}
</script>
