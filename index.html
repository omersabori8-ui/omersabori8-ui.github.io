<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabori</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  overflow-x:hidden;
  background: linear-gradient(-45deg, #ff4ecd, #6a5cff, #00c9ff, #ff9a9e);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index:999;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:white;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

nav a:hover{
  color:#00ffff;
}

/* HERO FULL SCREEN VIDEO */
.hero{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

.hero video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

.content h1{
  font-size:70px;
}

.content p{
  margin-top:15px;
  font-size:20px;
}

/* VIDEO SECTION */
.video-section{
  padding:140px 20px 80px;
  text-align:center;
  color:white;
  min-height:100vh;
}

.video-section h2{
  font-size:40px;
  margin-bottom:40px;
}

/* فقط این بخش حرفه‌ای شد (منظم شدن ویدیوها) */
.video-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap:30px;
  justify-items:center;
}

.video-grid video{
  width:100%;
  max-width:600px;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* MOBILE */
@media(max-width:768px){
  .content h1{
    font-size:35px;
  }
  .hero{
    height:60vh;
  }
  .video-grid{
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Sabori</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#videos">Video</a>
  </nav>
</header>

<!-- HOME -->
<section class="hero" id="home">

  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>SABORI</h1>
    <p>VIP Video Website</p>
  </div>

</section>

<!-- VIDEO SECTION -->
<section class="video-section" id="videos">
  <h2>My Videos</h2>

  <div class="video-grid">










<video src="c:\Users\Abdulbashir\Desktop\index\زمان حال ساده.mp4" controls autoplay loop width="400px" height="200px"></video>








  </div>
</section>

</body>
</html>





</body>
</html>
