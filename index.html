<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Saboori Secure Auth</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Segoe UI', Arial, sans-serif;}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #361599, #4203ff, #ff7b00, #804000);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    padding: 15px;
    overflow: hidden; /* جلوگیری از اسکرول بیجا */
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    width: 100%;
    max-width: 700px; /* خردتر کردن برای نمایش بهتر */
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    background: #0f0f0f;
}

.left {
    width: 55%;
    padding: 35px 25px;
    color: white;
}

.right {
    width: 45%;
    background: linear-gradient(135deg, #ff7b00, #ffcc00);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    padding: 20px;
}

/* بخش مخصوص موبایل */
@media (max-width: 600px) {
    .container {
        flex-direction: column;
        max-width: 340px;
    }
    .left, .right {
        width: 100%;
    }
    .right {
        padding: 20px;
        font-size: 18px;
        order: -1; /* بردن بخش رنگی به بالا */
    }
}

.input-box { margin-bottom: 20px; }

/* اصلاح فونت برای جلوگیری از زوم خودکار آیفون */
.input-box input {
    width: 100%;
    padding: 12px 5px;
    background: transparent;
    border: none;
    border-bottom: 2px solid #444;
    color: white;
    outline: none;
    font-size: 16px; /* مهم: جلوگیری از زوم */
}

.input-box input:focus {
    border-bottom-color: #ff7b00;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(to right, #ff7b00, #ffcc00);
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.switch { margin-top: 20px; font-size: 14px; text-align: center; }
.switch span { color: orange; cursor: pointer; text-decoration: underline; }

.hidden { display: none; }
.message { margin-top: 10px; font-size: 13px; text-align: center; }
.error { color: #ff4d4d; }
.success { color: lightgreen; }
</style>
</head>
<body>

<div class="container">
    <div class="left">
        <div id="loginForm">
            <h2 style="margin-bottom: 25px; font-size: 22px;">Login - Saboori</h2>
            <div class="input-box">
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
            </div>
            <div class="input-box">
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button onclick="login()">Start Session</button>
            <div class="switch">
                Don't have account? <span onclick="showRegister()">Register</span>
            </div>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="registerForm" class="hidden">
            <h2 style="margin-bottom: 25px; font-size: 22px;">Register</h2>
            <div class="input-box">
                <input type="email" id="regEmail" placeholder="Email" autocomplete="off">
            </div>
            <div class="input-box">
                <input type="password" id="regPass" placeholder="Password">
            </div>
            <button onclick="register()">Create Account</button>
            <div class="switch">
                Already have account? <span onclick="showLogin()">Login</span>
            </div>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <div class="right">
        Secure Login
    </div>
</div>

<script>
let storedEmail="";
let storedPass="";

function showRegister(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

function login(){
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const msg = document.getElementById("loginMessage");

    if(email===storedEmail && pass===storedPass && email !== ""){
        msg.className="message success";
        msg.innerText="Login Successful!";
    }else{
        msg.className="message error";
        msg.innerText="Wrong Email or Password!";
    }
}

function register(){
    const email = document.getElementById("regEmail").value.trim();
    const pass = document.getElementById("regPass").value.trim();
    const msg = document.getElementById("registerMessage");

    if(email.includes("@") && pass.length > 3){
        storedEmail=email;
        storedPass=pass;
        msg.className="message success";
        msg.innerText="Account Created!";
        setTimeout(showLogin, 1000);
    } else {
        msg.className="message error";
        msg.innerText="Fill details correctly!";
    }
}
</script>

</body>
</html>
