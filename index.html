<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>سابوری / Sabori</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(270deg, #0044cc, #00aaff, #0044cc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
  }
  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }
  .title {
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 40px;
    color: #ffffff;
    text-align: center;
  }
  .footer {
    margin-top: 40px;
    font-size: 22px;
    color: #ffffff;
    text-align: center;
  }
  .whatsapp-button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 20px;
    background-color: #25D366;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .whatsapp-button:hover {
    background-color: #1ebe5d;
  }
</style>
</head>
<body>

<div class="title">سابوری / Sabori</div>

<!-- QR Code فقط برای اسکن، لمس مستقیم کاری نکند -->
<canvas id="qrcode"></canvas>

<!-- متن پایین فقط نمایش -->
<div class="footer">
  دریافت پول از پی پال<br>
  Receive money from PayPal
</div>

<!-- دکمه واتساپ جداگانه -->
<button class="whatsapp-button" onclick="window.open('https://wa.me/93731983000', '_blank')">
  ارسال پیام در واتساپ
</button>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  const link = "https://wa.me/93731983000"; // لینک واتساپ برای دکمه
  const canvas = document.getElementById('qrcode');

  QRCode.toCanvas(canvas, link, {
    width: 300,
    color: {
      dark: '#0044cc', // رنگ QR
      light: '#ffffff'
    }
  }, function (error) {
    if (error) console.error(error);
    console.log('QR Code آماده شد! فقط برای اسکن');
  });
</script>

</body>
</html>
