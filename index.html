<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>سابوری</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(270deg, #0044cc, #00aaff, #0044cc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
  }
  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }
  .title {
    font-size: 50px;
    font-weight: bold;
    margin-bottom: 40px;
    color: #ffffff;
  }
  .footer {
    margin-top: 40px;
    font-size: 22px;
    color: #ffffff;
    text-align: center;
    cursor: pointer;
  }
  .qrcode-wrapper {
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="title">سابوری</div>

<div class="qrcode-wrapper" onclick="window.open('https://wa.me/93731983000', '_blank')">
  <canvas id="qrcode"></canvas>
</div>

<div class="footer" onclick="window.open('https://wa.me/93731983000', '_blank')">
  دریافت پول از پی پال<br>
  Receive money from PayPal
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  const link = "https://wa.me/93731983000";
  const canvas = document.getElementById('qrcode');

  QRCode.toCanvas(canvas, link, {
    width: 300,
    color: {
      dark: '#0044cc',
      light: '#ffffff'
    }
  }, function (error) {
    if (error) console.error(error);
    console.log('QR Code آماده شد!');
  });
</script>

</body>
</html>
